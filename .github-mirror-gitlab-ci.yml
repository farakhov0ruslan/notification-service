# GitHub Mirror Job
# Mirrors main branch to GitHub repository
#
# Required CI/CD Variables (Settings -> CI/CD -> Variables):
#   GITHUB_SSH_PRIVATE_KEY - SSH private key for GitHub (type: File, masked)
#   GITHUB_REPO_URL - GitHub repo SSH URL, e.g.: git@github.com:username/repo.git

mirror-to-github:
  stage: postpipeline
  image: alpine:latest
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
    GITHUB_SSH_KEY: |
      -----BEGIN OPENSSH PRIVATE KEY-----
      b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW
      QyNTUxOQAAACBrb/xPFnbs+nK2dGEhY4elOitF4A8uNRqIPXn//mGSEQAAAJAXed8GF3nf
      BgAAAAtzc2gtZWQyNTUxOQAAACBrb/xPFnbs+nK2dGEhY4elOitF4A8uNRqIPXn//mGSEQ
      AAAECNHdqgWNg+KR6xe5MxmOEFxrbmz6GNlkgyuafNK4Dv9Wtv/E8Wduz6crZ0YSFjh6U6
      K0XgDy41Gog9ef/+YZIRAAAADWdpdGxhYi1taXJyb3I=
      -----END OPENSSH PRIVATE KEY-----
    GITHUB_REPO_URL: git@github.com:farakhov0ruslan/notification-service.git
  before_script:
    - apk add --no-cache git openssh-client
    - eval $(ssh-agent -s)
    - echo "$GITHUB_SSH_KEY" > /tmp/github_deploy_key
    - chmod 600 /tmp/github_deploy_key
    - ssh-add /tmp/github_deploy_key
    - mkdir -p ~/.ssh
    - ssh-keyscan github.com >> ~/.ssh/known_hosts
    - git config --global user.email "ci@salestrigger.io"
    - git config --global user.name "GitLab CI"
  script:
    - git remote add github "$GITHUB_REPO_URL" || git remote set-url github "$GITHUB_REPO_URL"
    - git push github --all --force
    - git push github --tags --force
  rules:
      - when: on_success
  tags:
    - docker