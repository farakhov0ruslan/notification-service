notification-router:
  enabled: true
  replicaCount: 1

  image:
    repository: "${DOCKER_IMAGE_REPOSITORY}"
    tag: "${DOCKER_IMAGE_TAG}"
    pullPolicy: Always

  securityContext:
    runAsNonRoot: false
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  service:
    enabled: true
    type: ClusterIP
    labels:
      monitoring.salestrigger/scrape: "true"
    ports:
      - name: metrics
        port: 9090
        targetPort: 9090
        protocol: TCP

  command: ["/bin/bash", "-c"]
  args:
    - "python app/notification_service/router/router.py --env=${SCOPE}"

  envFromSecrets:
    - notification-service
