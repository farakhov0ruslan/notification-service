notification-service:
  enabled: true
  replicaCount: 1

  image:
    repository: "${DOCKER_IMAGE_REPOSITORY}"
    tag: "${DOCKER_IMAGE_TAG}"
    pullPolicy: Always

  securityContext:
    runAsNonRoot: false
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  service:
    enabled: true
    type: ClusterIP
    labels:
      monitoring.salestrigger/scrape: "true"
    ports:
      - name: grpc
        port: 46600
        targetPort: 46600
        protocol: TCP
      - name: metrics
        port: 9092
        targetPort: 9092
        protocol: TCP

  command: ["/bin/bash", "-c"]
  args:
    - "python app/notification_service/service/server.py --env=${SCOPE}"

  envFromSecrets:
    - notification-service

  externalSecret:
    enabled: true
    name: notification-service
    refreshInterval: 1h
    secretStoreRef:
      name: vault-salestrigger
      kind: ClusterSecretStore
    dataFrom:
      - extract:
          key: ${SCOPE}/notification-service
      - extract:
          key: ${SCOPE}/.general